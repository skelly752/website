<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skelly Company</title>

    <style>
        body {
            margin: 0;
            background: #111; /* darker blackish background */
            font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
            height: 100vh;
            color: white;
        }

        h1 {
            text-align: center;
            margin-top: 25px;
            font-size: 2.2rem;
            color: #ffffff;
            text-shadow: 2px 2px 8px rgba(255,255,255,0.2);
        }

        .button-container {
            height: calc(100vh - 100px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        a {
            text-decoration: none;
        }

        .channel-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 18px 36px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            background-color: #ff0000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }

        .channel-btn:hover {
            background-color: #cc0000;
            transform: scale(1.05);
        }

        .yt-icon {
            width: 28px;
            height: 28px;
        }

        /* Credits Dropdown */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .credits-btn {
            background: #1e90ff;
            color: white;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 15px rgba(30, 144, 255, 0.5);
        }

        .credits-btn:hover {
            background: #0077ea;
            transform: scale(1.05);
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 110%;
            left: 50%;
            transform: translateX(-50%);
            min-width: 280px;
            background: #222;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            z-index: 1;
        }

        .show {
            display: block;
        }
    </style>
</head>
<body>

    <h1>🎉 Welcome to the Beta Version of Skelly Company's Website! 🎉</h1>

    <div class="button-container">

        <a href="https://www.youtube.com/@real_skellyAC" target="_blank" rel="noopener noreferrer">
            <button class="channel-btn">

                <svg class="yt-icon" viewBox="0 0 24 24" fill="white">
                    <path d="M23.498 6.186a2.997 2.997 0 0 0-2.112-2.12C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.386.566A2.997 2.997 0 0 0 .502 6.186A31.2 31.2 0 0 0 0 12a31.2 31.2 0 0 0 .502 5.814 2.997 2.997 0 0 0 2.112 2.12C4.5 20.5 12 20.5 12 20.5s7.5 0 9.386-.566a2.997 2.997 0 0 0 2.112-2.12A31.2 31.2 0 0 0 24 12a31.2 31.2 0 0 0-.502-5.814zM9.75 15.02V8.98L15.5 12l-5.75 3.02z"/>
                </svg>

                Check out my channel!
            </button>
        </a>

        <!-- Credits Dropdown -->
        <div class="dropdown">
            <button class="credits-btn" onclick="toggleCredits()">
                📃 Credits
            </button>

            <div id="creditsMenu" class="dropdown-content">
                Credits go to skelly and the help of AI.
            </div>
        </div>

    </div>

    <script>
        function toggleCredits() {
            document.getElementById("creditsMenu").classList.toggle("show");
        }

        window.onclick = function(event) {
            if (!event.target.matches('.credits-btn')) {
                let dropdowns = document.getElementsByClassName("dropdown-content");
                for (let i = 0; i < dropdowns.length; i++) {
                    dropdowns[i].classList.remove('show');
                }
            }
        }
    </script>

</body>
</html>
