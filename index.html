<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skelly Company</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: "Inter", sans-serif;
        background: radial-gradient(circle at top, #1a1a1a, #0d0d0d);
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* LOGO */
    .logo {
        width: 260px;
        margin-top: 40px;
        border-radius: 18px;
        transition: none; /* removed hover movement */
    }

    h1 {
        margin-top: 20px;
        font-size: 4rem;
        font-weight: 800;
        text-align: center;
    }

    .arrow {
        font-size: 2rem;
        margin-top: 10px;
        opacity: 0.5;
        animation: float 2s ease-in-out infinite;
    }

    .button-container {
        margin-top: 60px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        align-items: center;
        width: 100%;
    }

    a {
        text-decoration: none;
    }

    .btn {
        width: min(620px, 94vw);
        padding: 22px 28px;
        border-radius: 999px;
        border: none;
        font-size: 22px;
        font-weight: 600;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        transition: all 0.25s ease;
        backdrop-filter: blur(10px);
        position: relative;
        overflow: hidden;
    }

    .btn::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(255,255,255,0.08);
        opacity: 0;
        transition: 0.3s;
    }

    .btn:hover::after {
        opacity: 1;
    }

    .btn:active {
        transform: scale(0.96);
    }

    /* YOUTUBE */
    .yt {
        background: linear-gradient(135deg, #ff2d2d, #c40000);
        box-shadow: 0 10px 25px rgba(255,0,0,0.25);
    }

    .yt:hover {
        transform: translateY(-4px);
        box-shadow: 0 15px 35px rgba(255,0,0,0.4);
    }

    .yt-icon {
        width: 26px;
        height: 26px;
    }

    /* CREDITS */
    .dropdown {
        position: relative;
    }

    .credits-btn {
        background: linear-gradient(135deg, #3a8dff, #1d5fff);
        box-shadow: 0 10px 25px rgba(0,100,255,0.25);
    }

    .credits-btn:hover {
        transform: translateY(-4px);
        box-shadow: 0 15px 35px rgba(0,100,255,0.4);
    }

    .dropdown-content {
        position: absolute;
        top: 120%;
        left: 50%;
        transform: translateX(-50%) translateY(-12px) scale(0.96);
        width: min(420px, 90vw);
        background: rgba(25,25,25,0.9);
        border: 1px solid rgba(255,255,255,0.1);
        backdrop-filter: blur(12px);
        border-radius: 16px;
        padding: 14px;
        text-align: center;

        opacity: 0;
        pointer-events: none;
        transition: all 0.28s ease;
    }

    .dropdown-content.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1);
        pointer-events: auto;
    }

    footer {
        margin-top: auto;
        padding: 20px;
        font-size: 12px;
        color: rgba(255,255,255,0.4);
        text-align: center;
    }

    @keyframes float {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(8px); }
    }
</style>
</head>

<body>

<img src="IMG_3603.PNG" class="logo" alt="Skelly Logo">

<h1>💀SKELLY COMPANY💀</h1>

<div class="arrow">↓</div>

<div class="button-container">

    <a href="https://www.youtube.com/@real_skellyAC" target="_blank">
        <button class="btn yt">
            <svg class="yt-icon" viewBox="0 0 24 24" fill="white">
                <path d="M23.498 6.186a2.997 2.997 0 0 0-2.112-2.12C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.386.566A2.997 2.997 0 0 0 .502 6.186A31.2 31.2 0 0 0 0 12a31.2 31.2 0 0 0 .502 5.814 2.997 2.997 0 0 0 2.112 2.12C4.5 20.5 12 20.5 12 20.5s7.5 0 9.386-.566a2.997 2.997 0 0 0 2.112-2.12A31.2 31.2 0 0 0 24 12a31.2 31.2 0 0 0-.502-5.814zM9.75 15.02V8.98L15.5 12l-5.75 3.02z"/>
            </svg>
            Check out my channel
        </button>
    </a>

    <div class="dropdown">
        <button class="btn credits-btn" onclick="toggleCredits()">
            📃 Credits
        </button>

        <div id="creditsMenu" class="dropdown-content">
            Credits go to <strong>Skelly</strong> and the help of <strong>AI</strong>.
        </div>
    </div>

</div>

<footer>
    © Skelly Company 2026 — All Rights Reserved
</footer>

<script>
function toggleCredits() {
    document.getElementById("creditsMenu").classList.toggle("show");
}

window.addEventListener("click", function(e) {
    if (!e.target.closest(".dropdown")) {
        document.getElementById("creditsMenu").classList.remove("show");
    }
});
</script>

</body>
</html>
